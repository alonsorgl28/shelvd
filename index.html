<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelvd</title>
    <meta name="description" content="Your personal book library in 3D — Shelvd">
    <meta property="og:title" content="Shelvd">
    <meta property="og:description" content="Your personal book library, stacked and browsable in 3D">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Login: Library Card ── -->
<div class="auth-screen" id="auth-screen">
    <div class="library-card" id="library-card">
        <div class="library-card-header">
            <div class="library-card-logo"><span class="lc-s">S</span>helvd</div>
            <div class="library-card-subtitle">LIBRARY CARD</div>
        </div>
        <div class="library-card-stamp" id="library-card-stamp"></div>
        <div class="library-card-body" id="auth-form-container">
            <!-- Step 1: Email -->
            <form id="auth-email-form" class="auth-step">
                <label class="auth-label">Email</label>
                <input type="email" id="auth-email" class="auth-input" placeholder="you@email.com" required autocomplete="email">
                <button type="submit" class="auth-button" id="auth-submit-btn">Send magic link</button>
            </form>
            <!-- Step 2: Check email -->
            <div id="auth-check-email" class="auth-step" style="display:none;">
                <div class="auth-check-icon">&#9993;</div>
                <div class="auth-check-text">Check your email</div>
                <div class="auth-check-sub">We sent a login link to <strong id="auth-sent-email"></strong></div>
                <button class="auth-link-btn" id="auth-back-btn">Use a different email</button>
            </div>
            <!-- Step 3: Choose username (new users) -->
            <form id="auth-username-form" class="auth-step" style="display:none;">
                <label class="auth-label">Choose your username</label>
                <div class="auth-username-preview">shelvd.app/<strong id="username-preview-text">@</strong></div>
                <input type="text" id="auth-username" class="auth-input" placeholder="username" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+">
                <button type="submit" class="auth-button">Claim your shelf</button>
                <div class="auth-error" id="username-error"></div>
            </form>
        </div>
        <div class="library-card-footer">
            <div class="library-card-number" id="library-card-number">No. ------</div>
        </div>
    </div>
</div>

<!-- Logo -->
<a href="/" class="shelvd-logo"><span class="shelvd-logo-s">S</span><span class="shelvd-logo-text">helvd</span></a>

<!-- User Header -->
<div class="library-user-header" style="display:none;">
    <div class="library-user-header-content">
        <div class="library-user-username" id="library-user-username">@user</div>
        <div class="library-user-stats">
            <span id="header-book-count">0 books</span>
        </div>
    </div>
</div>

<!-- Share Button -->
<button class="share-btn" id="share-btn" style="display:none;">
    <div class="share-btn-inner">
        <svg class="share-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        <svg class="share-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span class="share-label">Share</span>
    </div>
    <div class="share-particles" id="share-particles"></div>
</button>

<!-- Add Book Button -->
<button class="add-book-btn" id="add-book-btn" style="display:none;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
</button>

<!-- Add Book Modal -->
<div class="add-book-modal" id="add-book-modal" style="display:none;">
    <div class="add-book-backdrop" id="add-book-backdrop"></div>
    <div class="add-book-card">
        <!-- Step 1: Capture -->
        <div class="add-step" id="add-step-capture">
            <div class="add-step-header">
                <div class="add-step-title">Add a book</div>
                <button class="add-close-btn" id="add-close-btn">&times;</button>
            </div>
            <div class="add-capture-zone" id="add-capture-zone">
                <div class="add-capture-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </div>
                <div class="add-capture-text">Take or upload a photo of your book cover</div>
                <div class="add-capture-sub">Your photo will be the cover in your shelf</div>
            </div>
            <input type="file" id="add-book-input" accept="image/*" capture="environment" style="display:none;">
        </div>

        <!-- Step 2: Analyzing -->
        <div class="add-step" id="add-step-analyzing" style="display:none;">
            <div class="add-step-header">
                <div class="add-step-title">Analyzing...</div>
            </div>
            <div class="add-analyzing">
                <div class="add-preview-img" id="add-preview-analyzing"></div>
                <div class="add-analyzing-bar">
                    <div class="add-analyzing-progress"></div>
                </div>
                <div class="add-analyzing-text">Reading the cover</div>
            </div>
        </div>

        <!-- Step 3: Confirm -->
        <div class="add-step" id="add-step-confirm" style="display:none;">
            <div class="add-step-header">
                <div class="add-step-title">Confirm</div>
                <button class="add-close-btn" id="add-confirm-close">&times;</button>
            </div>
            <div class="add-confirm-layout">
                <div class="add-preview-img" id="add-preview-confirm"></div>
                <div class="add-confirm-fields">
                    <label class="add-field-label">Title</label>
                    <input type="text" class="add-field-input" id="add-field-title" placeholder="Book title">
                    <label class="add-field-label">Author</label>
                    <input type="text" class="add-field-input" id="add-field-author" placeholder="Author name">
                    <label class="add-field-label">Pages</label>
                    <input type="number" class="add-field-input" id="add-field-pages" placeholder="250">
                </div>
            </div>
            <button class="add-confirm-btn" id="add-confirm-btn">Add to shelf</button>
            <button class="add-retake-btn" id="add-retake-btn">Retake photo</button>
        </div>
    </div>
</div>

<!-- View Toggle Pill (Bottom Center) -->
<div class="library-view-toggle-pill" id="view-toggle-pill">
    <div class="view-toggle">
        <label>
            <input type="radio" name="view" value="shelf" checked>
            <div class="toggle-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="6.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="5" y="9.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="3" y="12.25" width="18" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="6" y="15.25" width="12" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="4" y="18.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
                </svg>
            </div>
            <span>Shelf</span>
        </label>
        <label>
            <input type="radio" name="view" value="grid">
            <div class="toggle-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
            <span>Grid</span>
        </label>
    </div>
</div>

<!-- Book Pull Out Arrow -->
<div class="library-book-arrow" id="library-book-arrow">
    <div class="library-book-arrow-button">
        <svg viewBox="0 0 24 24">
            <path d="M12 5v14M5 12l7-7 7 7"/>
        </svg>
    </div>
    <div class="library-book-arrow-hint">Swipe up</div>
</div>

<!-- 3D Container -->
<div class="library-3d-container" id="library-3d-container">
    <div class="library-loading" id="library-loading">
        <div class="loading-spinner"></div>
    </div>
</div>

<!-- Stack Scrollbar -->
<div class="stack-scrollbar" id="stack-scrollbar">
    <div class="stack-scrollbar-track">
        <div class="stack-scrollbar-thumb" id="stack-scrollbar-thumb"></div>
    </div>
</div>

<!-- Grid View (hidden by default) -->
<div class="grid-view" id="grid-view" style="display:none;"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
}
</script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
