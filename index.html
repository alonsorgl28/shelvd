<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelvd</title>
    <meta name="description" content="Your personal book library in 3D — Shelvd">
    <meta property="og:title" content="Shelvd">
    <meta property="og:description" content="Your personal book library, stacked and browsable in 3D">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Login: Library Card ── -->
<div class="auth-screen" id="auth-screen">
    <div class="library-card" id="library-card">
        <div class="library-card-header">
            <div class="library-card-logo"><span class="lc-s">S</span>helvd</div>
            <div class="library-card-subtitle">LIBRARY CARD</div>
        </div>
        <div class="library-card-stamp" id="library-card-stamp"></div>
        <div class="library-card-body" id="auth-form-container">
            <!-- Step 1: Email -->
            <form id="auth-email-form" class="auth-step">
                <label class="auth-label">Email</label>
                <input type="email" id="auth-email" class="auth-input" placeholder="you@email.com" required autocomplete="email">
                <button type="submit" class="auth-button" id="auth-submit-btn">Send magic link</button>
            </form>
            <!-- Step 2: Check email -->
            <div id="auth-check-email" class="auth-step" style="display:none;">
                <div class="auth-check-icon">&#9993;</div>
                <div class="auth-check-text">Check your email</div>
                <div class="auth-check-sub">We sent a login link to <strong id="auth-sent-email"></strong></div>
                <button class="auth-link-btn" id="auth-back-btn">Use a different email</button>
            </div>
            <!-- Step 3: Choose username (new users) -->
            <form id="auth-username-form" class="auth-step" style="display:none;">
                <label class="auth-label">Choose your username</label>
                <div class="auth-username-preview">shelvd.app/<strong id="username-preview-text">@</strong></div>
                <input type="text" id="auth-username" class="auth-input" placeholder="username" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+">
                <button type="submit" class="auth-button">Claim your shelf</button>
                <div class="auth-error" id="username-error"></div>
            </form>
        </div>
        <div class="library-card-footer">
            <div class="library-card-number" id="library-card-number">No. ------</div>
        </div>
    </div>
</div>

<!-- Logo -->
<a href="/" class="shelvd-logo"><span class="shelvd-logo-s">S</span><span class="shelvd-logo-text">helvd</span></a>

<!-- User Header -->
<div class="library-user-header" style="display:none;">
    <div class="library-user-header-content">
        <div class="library-user-username" id="library-user-username">@user</div>
        <div class="library-user-stats">
            <span id="header-book-count">0 books</span>
        </div>
    </div>
</div>

<!-- View Toggle Pill (Bottom Center) -->
<div class="library-view-toggle-pill" id="view-toggle-pill">
    <div class="view-toggle">
        <label>
            <input type="radio" name="view" value="shelf" checked>
            <div class="toggle-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="6.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="5" y="9.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="3" y="12.25" width="18" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="6" y="15.25" width="12" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="4" y="18.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
                </svg>
            </div>
            <span>Shelf</span>
        </label>
        <label>
            <input type="radio" name="view" value="grid">
            <div class="toggle-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
            <span>Grid</span>
        </label>
    </div>
</div>

<!-- Book Pull Out Arrow -->
<div class="library-book-arrow" id="library-book-arrow">
    <div class="library-book-arrow-button">
        <svg viewBox="0 0 24 24">
            <path d="M12 5v14M5 12l7-7 7 7"/>
        </svg>
    </div>
    <div class="library-book-arrow-hint">Swipe up</div>
</div>

<!-- 3D Container -->
<div class="library-3d-container" id="library-3d-container">
    <div class="library-loading" id="library-loading">
        <div class="loading-spinner"></div>
    </div>
</div>

<!-- Stack Scrollbar -->
<div class="stack-scrollbar" id="stack-scrollbar">
    <div class="stack-scrollbar-track">
        <div class="stack-scrollbar-thumb" id="stack-scrollbar-thumb"></div>
    </div>
</div>

<!-- Grid View (hidden by default) -->
<div class="grid-view" id="grid-view" style="display:none;"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
}
</script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
